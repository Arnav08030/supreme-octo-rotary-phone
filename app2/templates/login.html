<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
        background: linear-gradient(135deg, #c3a3d7, #96a7e8, #81dddd);
        font-family: 'Poppins', sans-serif; 
        display: flex;
        justify-content: center; 
        align-items: center; 
        min-height: 100vh;
        
        
        }

        .card {
        border: none;
        border-radius: 20px; 
        background-color: rgba(255, 255, 255, 0.95); 
        box-shadow: 0px 10px 30px -5px rgba(0, 0, 0, 0.3); 
        
        width: 500px; 
        }

        .card-header {
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        background-color: transparent; 
        color: #333;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        padding: 25px;
        }
       
        .card-header i {
        font-size: 3rem;
        color: #6c63ff; 
        margin-bottom: 10px;
        }

        .card-body {
        padding: 35px;
        }

        .form-label {
        font-weight: 600;
        color: #333;
        margin-bottom: 5px; 
        }

        .form-control,
        .form-select {
        border-radius: 10px; 
        padding: 12px 18px; 
        border: 1px solid #ced4da;
        font-size: 1rem;
        transition: all 0.3s ease; 
        }

        .form-control:focus,
        .form-select:focus {
        box-shadow: 0 0 0 0.25rem rgba(108, 99, 255, 0.3); 
        border-color: #9999ff;
        outline: 0;
        }

        .btn {
        padding: 12px 25px;
        font-weight: 600;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-size: 1rem;
        
        }

        .btn-primary {
        background-color: #6c63ff; 
        border-color: #6c63ff;
        
        }

        .btn-primary:hover {
        background-color: #554fd8;
        border-color: #4c47c5;
        }

        .btn-secondary {
        background-color: #f0f0f0; 
        border-color: #f0f0f0;
        color: #333; 
        
        }

        .btn-secondary:hover {
        background-color: #e0e0e0;
        border-color: #d9d9d9;
        }

        .error-message {
        color: #dc3545;
        margin-top: 10px;
        font-size: 0.9rem;
        
        }

        .d-grid {
        
        
        gap: 20px; 
        }

        
        .card, .btn {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
        transform: translateY(-5px);
        box-shadow: 0px 12px 35px -5px rgba(0, 0, 0, 0.4);
        }
        .register-link:hover{
            text-decoration: underline;
        }
       
        @media (max-width: 576px) {
        .card {
            border-radius: 0; 
            box-shadow: none;
        }

        .card-header {
            font-size: 1.8rem;
            padding: 20px;
        }

        .card-body {
            padding: 25px;
        }
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="row">
            <div class="col-md-12 ">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-user-circle"></i><br>
                        LOGIN
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Login</button>

                            </div>
                        </form>
                        <p class="mt-3 text-center register-link">
                            Don't have an account? <a href="{% url 'register' %}">Register</a>
                        </p>
                        {% if errormessage %}
                        <p class="error-message">{{ errormessage }}</p>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
