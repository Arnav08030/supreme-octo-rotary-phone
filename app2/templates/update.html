<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
            background-color: rgb(227, 253, 239); /* Light green background */
            font-family: 'Arial', sans-serif; /* Example font */
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        }

        .card-header {
            background-color: #007bff;
            color: white;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 15px;
        }

        .card-header h4 { /* Adjust if you have an actual heading element */
            margin: 0;
            font-size: 1.5rem;
        }

        .card-body {
            padding: 20px;
        }

        .form-label {
            font-weight: 600;
        }

        .form-control,
        .form-select {
            border-radius: 5px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
        }

        .form-select {
            padding-right: 30px; /* Make room for the arrow */
        }

        .btn-primary {
            background-color: #28a745; /* Green button color */
            border-color: #28a745;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #218838; /* Darker green on hover */
            border-color: #1e7e34;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            border-color: #545b62;
        }

        .select2-container .select2-selection--single {
            height: calc(2.25rem + 2px);
            padding: .375rem .75rem;
            border: 1px solid #ced4da;
            border-radius: .25rem;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: calc(2.25rem + 2px);
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 2.25rem;
        }

        .select2-container--default .select2-selection--single,
        .select2-container--default.select2-container--open .select2-selection--single {
            border-color: #80bdff; /* Highlight color when active */
        }

        .select2-results__option {
            padding: 6px 12px;
        }

        .select2-container--default .select2-results__option--highlighted.select2-results__option--selectable,
        .select2-container--default .select2-results__option--selected {
            background-color: #007bff; /* Highlight color for options */
            color: white;
        }

        /* Flatpickr Styles */
        .flatpickr-calendar {
            background-color: white;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .flatpickr-day {
            color: #212529;
        }

        .flatpickr-day.today {
            color: #007bff;
            border-color: #007bff;
        }

        .flatpickr-day.selected,
        .flatpickr-day.selected:hover {
            background-color: #007bff;
            border-color: #007bff;
            color: white;
        }

        .flatpickr-months .flatpickr-month,
        .flatpickr-weekday {
            color: #212529;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            font-weight: 600;
        }

        .flatpickr-time input {
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 5px;
        }
        .breadcrumb {
            background-color: transparent;
            padding: 0;
        }

        .breadcrumb-item a {
            color: #007bff;
            text-decoration: none;
        }

        .breadcrumb-item a:hover {
            text-decoration: underline;
        }

        .breadcrumb-item.active {
            color: #6c757d;
        }

        /* Add more styles as needed to match the first image */
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <h4>UPDATE</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="username" name="username" value="{{user_data.username}}">
                                </div>
                                <div class="col-md-4">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" value="{{user_data.password}}">
                                </div>
                                <div class="col-md-4">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" name="name" value="{{user_data.name}}">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="text" class="form-control" id="email" name="email" value="{{user_data.email}}">
                                </div>
                                <div class="col-md-4">
                                    <label for="mobile" class="form-label">Mobile</label>
                                    <input type="text" class="form-control" id="mobile" name="mobile" value="{{user_data.mobile}}">
                                </div>
                                <div class="col-md-4">
                                    <label for="country" class="form-label">Country</label>
                                    <select class="form-select js-example-basic-multiple" id="country" name="country">
                                        {% for value, label in user_data.country_choices %}
                                            <option value="{{ value }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="state" class="form-label">State</label>
                                    <select class="form-select js-example-basic-multiple" id="state" name="state">
                                        <option value="">{{user_data.state}}</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="district" class="form-label">District</label>
                                    <select class="form-select js-example-basic-multiple" id="district" name="district">
                                        <option value="">{{user_data.district}}</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="gender" class="form-label">Gender</label>
                                    <select class="form-select" id="gender" name="gender">
                                        {% for value, label in user_data.gender_choice %}
                                            <option value="{{ value }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="language" class="form-label">Language</label>
                                    <select class="form-select" id="language" name="language">
                                        {% for code, label in user_data.language_choices %}
                                            <option value="{{ code }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-primary">Update and Login</button>
                                <a href="{% url 'login' %}" class="btn btn-secondary">cancel</a>
                            </div>
                        </form>
                        <script>
                            const countrySelect = document.getElementById('country');
                            const stateSelect = document.getElementById('state');
                            const districtSelect = document.getElementById('district');
                            
                            countrySelect.addEventListener('change', () => {
                                const countryName = countrySelect.value;
                                stateSelect.innerHTML = '<option value="">Select State</option>';
                                districtSelect.innerHTML = '<option value="">Select District</option>';
                                if (countryName) {
                                    fetch(`/start/get_states?country=${countryName}`)
                                        .then(response => response.json())
                                        .then(data => {
                                            data.states.forEach(state => {
                                                const option = document.createElement('option');
                                                option.value = state;
                                                option.text = state;
                                                stateSelect.add(option);
                                            });
                                            
                                        });
                                }
                            });
                            
                            stateSelect.addEventListener('change', () => {
                                const state = stateSelect.value;
                                districtSelect.innerHTML = '<option value="">Select District</option>';
                                if (state) {
                                    fetch(`/start/get_districts?state=${state}`)
                                        .then(response => response.json())
                                        .then(data => {
                                            data.districts.forEach(districtName => {
                                                const option = document.createElement('option');
                                                option.value = districtName;
                                                option.text = districtName;
                                                districtSelect.add(option);
                                            });
                                           
                                        });
                                }
                            });
                        </script>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.8/js/select2.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
</body>
</html>
